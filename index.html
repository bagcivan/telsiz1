<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görünmez Telsiz</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ui { text-align: center; width: 100%; padding: 20px; }
        #ptt { 
            width: 180px; height: 180px; border-radius: 50%; border: 5px solid #0f0;
            background: transparent; color: #0f0; font-size: 20px; font-weight: bold;
            display: none; cursor: pointer; margin: 20px auto; outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); transition: 0.2s;
        }
        #ptt.active { background: #0f0; color: #000; box-shadow: 0 0 50px #0f0; transform: scale(0.95); }
        .log { font-family: monospace; font-size: 12px; color: #0a0; margin-top: 20px; min-height: 50px; }
        button#start { padding: 15px 40px; font-size: 18px; background: #0f0; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="ui">
    <h1 style="letter-spacing: 5px;">LAN-VOX</h1>
    
    <button id="start">SİSTEMİ AÇ</button>
    <button id="ptt">BAS KONUŞ</button>
    
    <div id="status" class="log">Bağlantı bekleniyor...</div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const pttBtn = document.getElementById('ptt');
    const statusDiv = document.getElementById('status');
    let localStream, peer, currentIP;

    const log = (msg) => { statusDiv.innerText = "> " + msg; console.log(msg); };

    startBtn.onclick = async () => {
        startBtn.style.display = 'none';
        log("Sistem başlatılıyor...");

        try {
            // 1. Mikrofonu Al
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks()[0].enabled = false; // Sessiz başla
            log("Mikrofon aktif.");

            // 2. Dış IP'yi al (Aynı Wi-Fi grubunu belirlemek için)
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            currentIP = data.ip.replace(/\./g, '-');
            
            // 3. Önce "MASTER" olmayı dene
            connectAsMaster();

        } catch (e) {
            log("HATA: " + e.message);
            startBtn.style.display = 'block';
        }
    };

    function connectAsMaster() {
        const masterID = `vox-room-${currentIP}`;
        peer = new Peer(masterID);

        peer.on('open', (id) => {
            log("KANAL LİDERİSİN. Diğer cihaz bekleniyor...");
            setupPTT();
        });

        // Eğer bu ID zaten alınmışsa (yani bir Master varsa), "GUEST" olarak bağlan
        peer.on('error', (err) => {
            if (err.type === 'id-taken') {
                log("Kanal dolu, bağlanılıyor...");
                connectAsGuest();
            } else {
                log("Peer Hatası: " + err.type);
            }
        });

        peer.on('call', (call) => {
            log("Cihaz bağlandı!");
            call.answer(localStream);
            handleCall(call);
        });
    }

    function connectAsGuest() {
        const guestID = `vox-guest-${currentIP}-${Math.floor(Math.random()*999)}`;
        peer = new Peer(guestID);

        peer.on('open', (id) => {
            const masterID = `vox-room-${currentIP}`;
            log("Kanala giriliyor...");
            const call = peer.call(masterID, localStream);
            handleCall(call);
        });
    }

    function handleCall(call) {
        call.on('stream', (remoteStream) => {
            const audio = new Audio();
            audio.srcObject = remoteStream;
            audio.play();
            log("TELSİZ AKTİF");
            pttBtn.style.display = 'block';
        });
    }

    // BAS KONUŞ MANTIĞI
    function setupPTT() {
        const startTalk = (e) => {
            e.preventDefault();
            if(localStream) localStream.getAudioTracks()[0].enabled = true;
            pttBtn.classList.add('active');
            pttBtn.innerText = "YAYINDA";
        };

        const stopTalk = (e) => {
            e.preventDefault();
            if(localStream) localStream.getAudioTracks()[0].enabled = false;
            pttBtn.classList.remove('active');
            pttBtn.innerText = "BAS KONUŞ";
        };

        pttBtn.onmousedown = startTalk;
        pttBtn.onmouseup = stopTalk;
        pttBtn.ontouchstart = startTalk;
        pttBtn.ontouchend = stopTalk;
    }
</script>

</body>
</html>
