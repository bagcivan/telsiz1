<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>60+ Kişilik Dinamik Telsiz</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ui { text-align: center; width: 90%; }
        #ptt { 
            width: 180px; height: 180px; border-radius: 50%; border: 6px solid #0f0;
            background: transparent; color: #0f0; font-size: 20px; font-weight: bold;
            display: none; cursor: pointer; margin: 20px auto; outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); user-select: none;
        }
        #ptt.active { background: #0f0; color: #000; box-shadow: 0 0 60px #0f0; }
        #ptt:disabled { border-color: #333; color: #333; }
        .log { font-family: monospace; font-size: 11px; color: #0a0; margin-top: 10px; height: 60px; overflow: hidden; }
        button#start { padding: 20px 50px; font-size: 20px; background: #0f0; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div class="ui">
    <h2 id="header">TELSİZ FREKANSI</h2>
    <div id="info" style="color: #64748b; margin-bottom: 10px;">Bağlı Değil</div>
    
    <button id="start">SİSTEME GİR</button>
    <button id="ptt">BAS KONUŞ</button>
    
    <div id="status" class="log">Açmak için BAŞLAT'a basın.</div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const pttBtn = document.getElementById('ptt');
    const statusDiv = document.getElementById('status');
    const infoDiv = document.getElementById('info');
    
    let localStream, peer, baseID, mySlot;
    let isSpeaking = false;
    let activeCalls = [];

    const log = (msg) => { statusDiv.innerHTML = "> " + msg; };

    startBtn.onclick = async () => {
        startBtn.style.display = 'none';
        log("Frekans aranıyor...");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks()[0].enabled = false;

            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            baseID = "v" + data.ip.replace(/[^0-9]/g, ""); 
            
            findSlot(1);
        } catch (e) { log("Mikrofon hatası!"); }
    };

    function findSlot(slot) {
        if(slot > 60) { log("Kanal dolu!"); return; }
        const tryID = baseID + "s" + slot;
        peer = new Peer(tryID);

        peer.on('open', (id) => {
            mySlot = slot;
            log(`FREKANSTASIN: Slot-${slot}`);
            infoDiv.innerText = `ID: ${slot} | Dinlemede...`;
            pttBtn.style.display = 'block';
            initReceiver();
        });

        peer.on('error', (err) => {
            if(err.type === 'id-taken') { peer.destroy(); findSlot(slot + 1); }
        });
    }

    // DİNLEME MODU: Birisi konuşmaya başlarsa otomatik cevap ver
    function initReceiver() {
        peer.on('call', (call) => {
            infoDiv.innerText = "YAYIN ALINIYOR...";
            pttBtn.disabled = true; // Biri konuşurken ben konuşamam
            call.answer();
            call.on('stream', (remoteStream) => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play();
            });
            call.on('close', () => {
                infoDiv.innerText = "Dinlemede...";
                pttBtn.disabled = false;
            });
        });
    }

    // KONUŞMA MODU: Butona basıldığında herkese yayın yap
    const startBroadcast = () => {
        if(pttBtn.disabled) return;
        isSpeaking = true;
        localStream.getAudioTracks()[0].enabled = true;
        pttBtn.classList.add('active');
        infoDiv.innerText = "YAYINDA!";

        // 60 kişiyi hızlıca ara
        for (let i = 1; i <= 60; i++) {
            if (i === mySlot) continue;
            const targetID = baseID + "s" + i;
            const call = peer.call(targetID, localStream);
            if(call) activeCalls.push(call);
        }
    };

    const stopBroadcast = () => {
        isSpeaking = false;
        localStream.getAudioTracks()[0].enabled = false;
        pttBtn.classList.remove('active');
        infoDiv.innerText = "Dinlemede...";
        
        // Tüm bağlantıları kapat
        activeCalls.forEach(call => call.close());
        activeCalls = [];
    };

    pttBtn.onmousedown = startBroadcast;
    pttBtn.onmouseup = stopBroadcast;
    pttBtn.ontouchstart = (e) => { e.preventDefault(); startBroadcast(); };
    pttBtn.ontouchend = (e) => { e.preventDefault(); stopBroadcast(); };

</script>
</body>
</html>
