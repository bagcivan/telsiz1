<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grup Telsizi (Mesh)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #050505; color: #0f0; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ui { text-align: center; width: 90%; }
        #ptt { 
            width: 150px; height: 150px; border-radius: 50%; border: 4px solid #0f0;
            background: transparent; color: #0f0; font-size: 16px; font-weight: bold;
            display: none; cursor: pointer; margin: 20px auto; outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); user-select: none;
        }
        #ptt.active { background: #0f0; color: #000; box-shadow: 0 0 40px #0f0; transform: scale(0.92); }
        .log { font-family: monospace; font-size: 11px; color: #0a0; margin-top: 20px; line-height: 1.4; max-height: 100px; overflow-y: auto; }
        button#start { padding: 18px 45px; font-size: 18px; background: #0f0; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: #000; }
        .member-count { font-size: 12px; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div class="ui">
    <h2 style="letter-spacing: 2px;">GRUP TELSİZİ</h2>
    <div id="memberCount" class="member-count">Bağlı cihaz: 1</div>
    
    <button id="start">SİSTEME GİR</button>
    <button id="ptt">BAS KONUŞ</button>
    
    <div id="status" class="log">Ağa katılmak için BAŞLAT'a basın.</div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const pttBtn = document.getElementById('ptt');
    const statusDiv = document.getElementById('status');
    const memberCountDiv = document.getElementById('memberCount');
    
    let localStream, peer, myIP;
    let connectedPeers = {}; // Bağlı olan herkesi burada tutacağız

    const log = (msg) => { statusDiv.innerHTML = "> " + msg + "<br>" + statusDiv.innerHTML; };

    startBtn.onclick = async () => {
        startBtn.style.display = 'none';
        log("Ağ taranıyor...");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks()[0].enabled = false;

            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            myIP = "vox" + data.ip.replace(/[^0-9]/g, ""); 
            
            findMySlot(1); // 1. numaralı slottan aramaya başla

        } catch (e) {
            log("Mikrofon hatası: " + e.message);
            startBtn.style.display = 'block';
        }
    };

    // Boş bir ID slotu bul (voxIP1, voxIP2... voxIP10)
    function findMySlot(slotNum) {
        if (slotNum > 10) {
            log("Oda dolu! (Maks 10 kişi)");
            return;
        }

        const tryID = myIP + "n" + slotNum;
        peer = new Peer(tryID);

        peer.on('open', (id) => {
            log("Sisteme girildi: Cihaz-" + slotNum);
            initUI();
            autoConnectToOthers(slotNum);
        });

        peer.on('error', (err) => {
            if (err.type === 'id-taken') {
                peer.destroy();
                findMySlot(slotNum + 1); // ID doluysa bir sonrakini dene
            } else {
                log("Hata: " + err.type);
            }
        });

        // Gelen aramaları kabul et (Diğerleri bizi aradığında)
        peer.on('call', (call) => {
            log("Yeni birisi bağlandı.");
            call.answer(localStream);
            handleCall(call);
        });
    }

    // Ağdaki diğer olası cihazları ara
    function autoConnectToOthers(mySlot) {
        for (let i = 1; i <= 10; i++) {
            if (i === mySlot) continue; // Kendini arama

            const targetID = myIP + "n" + i;
            const call = peer.call(targetID, localStream);
            
            if (call) {
                handleCall(call);
            }
        }
        pttBtn.style.display = 'block';
    }

    function handleCall(call) {
        if (connectedPeers[call.peer]) return; // Zaten bağlıysak tekrar etme

        call.on('stream', (remoteStream) => {
            connectedPeers[call.peer] = call;
            updateMemberCount();

            const audio = document.createElement('audio');
            audio.srcObject = remoteStream;
            audio.play();
        });

        call.on('close', () => {
            delete connectedPeers[call.peer];
            updateMemberCount();
            log("Bir cihaz ayrıldı.");
        });
    }

    function updateMemberCount() {
        const count = Object.keys(connectedPeers).length + 1;
        memberCountDiv.innerText = "Bağlı cihaz: " + count;
    }

    function initUI() {
        const talk = (on) => {
            if(localStream) localStream.getAudioTracks()[0].enabled = on;
            on ? pttBtn.classList.add('active') : pttBtn.classList.remove('active');
            pttBtn.innerText = on ? "YAYINDASIN" : "BAS KONUŞ";
        };

        pttBtn.onmousedown = () => talk(true);
        pttBtn.onmouseup = () => talk(false);
        pttBtn.ontouchstart = (e) => { e.preventDefault(); talk(true); };
        pttBtn.ontouchend = (e) => { e.preventDefault(); talk(false); };
    }
</script>

</body>
</html>
