<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MESH-TALK v4 (Final)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ui { text-align: center; width: 90%; }
        #ptt { 
            width: 180px; height: 180px; border-radius: 50%; border: 8px solid #0f0;
            background: transparent; color: #0f0; font-size: 22px; font-weight: bold;
            display: none; cursor: pointer; margin: 20px auto; outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #ptt.active { background: #0f0; color: #000; box-shadow: 0 0 60px #0f0; }
        #ptt:disabled { border-color: #222; color: #222; box-shadow: none; }
        .log { font-family: monospace; font-size: 11px; color: #0a0; margin-top: 15px; height: 100px; overflow-y: auto; text-align: left; background: #050505; padding: 10px; border: 1px solid #111; }
        button#start { padding: 20px 50px; font-size: 20px; background: #0f0; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: #000; box-shadow: 0 0 20px #0f0; }
        .info { color: #64748b; font-size: 13px; margin-bottom: 5px; height: 20px; }
    </style>
</head>
<body>

<div class="ui">
    <h2 style="letter-spacing: 5px; margin-bottom: 5px;">VOX-PRO</h2>
    <div id="info" class="info">Sistem Hazır</div>
    
    <button id="start">SİSTEMİ AÇ</button>
    <button id="ptt">BAS KONUŞ</button>
    
    <audio id="remoteAudio" autoplay playsinline></audio>
    
    <div id="status" class="log">Ağa katılmak için BAŞLAT'a basın.</div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const pttBtn = document.getElementById('ptt');
    const statusDiv = document.getElementById('status');
    const infoDiv = document.getElementById('info');
    const remoteAudio = document.getElementById('remoteAudio');
    
    let localStream, peer, baseID, mySlot;
    let activeCalls = [];

    const log = (msg) => { 
        statusDiv.innerHTML += `<div>> ${msg}</div>`; 
        statusDiv.scrollTop = statusDiv.scrollHeight;
    };

    startBtn.onclick = async () => {
        // SES KİLİDİNİ AÇ: Tarayıcının autoplay engelini aşmak için boş ses oynat
        remoteAudio.play().catch(() => {});
        
        startBtn.style.display = 'none';
        log("Cihaz hazırlanıyor...");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;
            
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            baseID = "v" + data.ip.replace(/[^0-9]/g, ""); 
            
            findSlot(1);
        } catch (e) {
            log("HATA: Mikrofon izni verilmedi.");
            startBtn.style.display = 'block';
        }
    };

    function findSlot(slot) {
        if(slot > 60) return log("Kanal dolu.");
        const tryID = baseID + "n" + slot;
        
        if(peer) peer.destroy();
        peer = new Peer(tryID, { debug: 0 }); // Debug 0 yaparak konsol kirliliğini kestik

        peer.on('open', (id) => {
            mySlot = slot;
            log(`BAĞLANDI: Kanal ${slot}`);
            infoDiv.innerText = `Cihaz-${slot} | Dinlemede`;
            pttBtn.style.display = 'block';
            setupReceiver();
        });

        peer.on('error', (err) => {
            if (err.type === 'id-taken') findSlot(slot + 1);
            else log("Bağlantı Hatası: " + err.type);
        });
    }

    function setupReceiver() {
        peer.on('call', (call) => {
            log("YAYIN GELİYOR...");
            pttBtn.disabled = true;
            call.answer(); // Gelen yayını aç
            
            call.on('stream', (stream) => {
                remoteAudio.srcObject = stream;
                remoteAudio.play(); // Sabit audio elementini kullan
                infoDiv.innerText = "SES ALINIYOR";
            });

            call.on('close', () => {
                pttBtn.disabled = false;
                infoDiv.innerText = `Cihaz-${mySlot} | Dinlemede`;
                log("Yayın bitti.");
            });
        });
    }

    function startTalking() {
        if (pttBtn.disabled) return;
        localStream.getAudioTracks()[0].enabled = true;
        pttBtn.classList.add('active');
        infoDiv.innerText = "YAYINDASIN";
        log("Yayın başlatıldı...");

        // Ağdaki diğer slotlara ses fırlat
        for (let i = 1; i <= 60; i++) {
            if (i === mySlot) continue;
            const call = peer.call(baseID + "n" + i, localStream);
            if (call) activeCalls.push(call);
        }
    }

    function stopTalking() {
        localStream.getAudioTracks()[0].enabled = false;
        pttBtn.classList.remove('active');
        infoDiv.innerText = `Cihaz-${mySlot} | Dinlemede`;
        log("Yayın kesildi.");

        activeCalls.forEach(c => c.close());
        activeCalls = [];
    }

    // Mobil için en sağlam dokunma olayları
    pttBtn.onmousedown = startTalking;
    pttBtn.onmouseup = stopTalking;
    pttBtn.ontouchstart = (e) => { e.preventDefault(); startTalking(); };
    pttBtn.ontouchend = (e) => { e.preventDefault(); stopTalking(); };

</script>
</body>
</html>
