<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Ağ Telsizi</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 20px; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; text-align: center; }
        button { width: 100%; padding: 15px; border-radius: 50px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        .status { margin-top: 20px; font-size: 0.8rem; color: #94a3b8; }
        #pttBtn { background: #ef4444; height: 120px; width: 120px; border-radius: 50%; margin: 20px auto; display: none; line-height: 120px; font-weight: bold; user-select: none; }
        #pttBtn.active { background: #b91c1c; transform: scale(0.9); box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>

<div class="container">
    <h2>Ağ Telsizi</h2>
    <div id="setup">
        <input type="text" id="roomName" placeholder="Oda Adı (Örn: Ofis)">
        <p style="font-size: 0.7rem; color: #64748b;">Aynı odayı yazan cihazlar eşleşir.</p>
        <button id="joinBtn">BAĞLAN</button>
    </div>

    <div id="talkZone" style="display:none;">
        <div id="pttBtn">BAS KONUŞ</div>
        <p id="remoteStatus">Diğer cihaz aranıyor...</p>
    </div>
    
    <div class="status" id="statusLog">Sistem hazır.</div>
</div>

<script>
    let peer = null;
    let localStream = null;
    const roomInput = document.getElementById('roomName');
    const joinBtn = document.getElementById('joinBtn');
    const statusLog = document.getElementById('statusLog');
    const pttBtn = document.getElementById('pttBtn');

    joinBtn.onclick = async () => {
        const room = roomInput.value.trim().toLowerCase();
        if (!room) return alert("Oda adı şart!");

        joinBtn.disabled = true;
        statusLog.innerText = "Mikrofon hazırlanıyor...";

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // Mikrofonu başlangıçta kapat (PTT mantığı)
            localStream.getAudioTracks()[0].enabled = false;

            // Çakışmayı önlemek için rastgele bir ID oluşturuyoruz ama oda ismini saklıyoruz
            const myRandomID = room + "-" + Math.floor(Math.random() * 10000);
            peer = new Peer(myRandomID);

            peer.on('open', (id) => {
                statusLog.innerText = "Bağlanıldı! Kimlik: " + id;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('talkZone').style.display = 'block';
                
                // Odadaki diğer kişiyi bulmak için "Lobby" mantığını simüle et
                findAndCallPeer(room, id);
            });

            peer.on('call', (call) => {
                console.log("Gelen çağrı alındı");
                call.answer(localStream);
                handleStream(call);
            });

        } catch (err) {
            alert("Mikrofon izni gerekli!");
            joinBtn.disabled = false;
        }
    };

    // BU KISIM KRİTİK: Otomatik eşleşme mantığı
    function findAndCallPeer(room, myID) {
        // PeerJS Cloud üzerinden tüm "oda" üyelerini listeleyemediğimiz için
        // Basit bir sinyalleşme yerine "kaba kuvvet" deniyoruz: 
        // Not: Gerçek bir sistemde burada bir veritabanı olur. 
        // Biz burada kullanıcıya "diğer cihazı aratacağız".
        
        statusLog.innerText = "Odada eş aranıyor...";
        
        // Bu örnekte, basitlik için: İkinci kişi birinciye el ile bağlanmak yerine
        // PeerJS'in 'error' olayını kullanarak odadaki diğer ID'leri tahmin etmeye çalışabiliriz.
        // Ama EN SAĞLIKLI "affordable" yöntem: Kullanıcının birinin "Arayan" diğerinin "Bekleyen" olmasıdır.
        
        // Şimdilik: Sadece diğer cihazın ismini tahmin eden bir döngü yerine 
        // ekrana bir "ARA" butonu koyalım ki ID çakışması olmasın.
        document.getElementById('remoteStatus').innerHTML = `
            Oda: <b>${room}</b><br><br>
            <button onclick="startManualCall()" style="padding:10px; font-size:12px;">DİĞER CİHAZI BUL</button>
        `;
    }

    window.startManualCall = () => {
        const targetID = prompt("Diğer cihazın altında yazan 4 haneli sayıyı girin:");
        const room = roomInput.value.trim().toLowerCase();
        if(targetID) {
            const call = peer.call(room + "-" + targetID, localStream);
            handleStream(call);
        }
    }

    function handleStream(call) {
        call.on('stream', (remoteStream) => {
            const audio = new Audio();
            audio.srcObject = remoteStream;
            audio.play();
            document.getElementById('remoteStatus').innerText = "BAĞLANTI KURULDU!";
            pttBtn.style.display = "block";
        });
    }

    // PTT - Bas Konuş Fonksiyonları
    const talk = (on) => {
        if(localStream) localStream.getAudioTracks()[0].enabled = on;
        on ? pttBtn.classList.add('active') : pttBtn.classList.remove('active');
        pttBtn.innerText = on ? "YAYINDA" : "BAS KONUŞ";
    };

    pttBtn.onmousedown = () => talk(true);
    pttBtn.onmouseup = () => talk(false);
    pttBtn.ontouchstart = (e) => { e.preventDefault(); talk(true); };
    pttBtn.ontouchend = (e) => { e.preventDefault(); talk(false); };

</script>
</body>
</html>
